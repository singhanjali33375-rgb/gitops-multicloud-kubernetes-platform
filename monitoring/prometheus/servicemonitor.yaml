#############################################
# ServiceMonitor
#############################################

apiVersion: monitoring.coreos.com/v1

kind: ServiceMonitor

metadata:

  name: gitops-app

  namespace: monitoring

  labels:

    release: prometheus

spec:

  selector:

    matchLabels:

      app: gitops-app

  namespaceSelector:

    matchNames:

      - gitops-app

  endpoints:

    - port: http

      path: /metrics

      interval: 30s

      scrapeTimeout: 10s
      #############################################
# Additional Endpoint Settings
#############################################

      honorLabels: true

      scheme: http

#############################################
# Relabel Configurations
#############################################

      relabelings:

        - sourceLabels:

            - __meta_kubernetes_pod_name

          targetLabel: pod

        - sourceLabels:

            - __meta_kubernetes_namespace

          targetLabel: namespace

#############################################
# Metric Relabel Configurations
#############################################

      metricRelabelings:

        - action: keep

          sourceLabels:

            - __name__

          regex: ".*"
