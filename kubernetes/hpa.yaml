############################################################
# Horizontal Pod Autoscaler
############################################################

apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler


metadata:

  name: gitops-app-hpa

  namespace: gitops-app



spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: gitops-app



  minReplicas: 2


  maxReplicas: 10



  metrics:

    - type: Resource

      resource:

        name: cpu

        target:

          type: Utilization

          averageUtilization: 70
