#############################################
# Prometheus Helm Values
#############################################

alertmanager:

  enabled: true

server:

  enabled: true

  retention: 15d

  persistentVolume:

    enabled: true

    size: 20Gi

    storageClass: gp3

  service:

    type: ClusterIP

    port: 9090
    #############################################
# Resources
#############################################

  resources:

    requests:

      cpu: 250m

      memory: 512Mi

    limits:

      cpu: 500m

      memory: 1Gi

#############################################
# Service Monitor
#############################################

serviceMonitor:

  enabled: true

#############################################
# Node Exporter
#############################################

nodeExporter:

  enabled: true

#############################################
# Pushgateway
#############################################

pushgateway:

  enabled: false
  #############################################
# kube-state-metrics
#############################################

kubeStateMetrics:

  enabled: true

#############################################
# Prometheus Operator
#############################################

prometheusOperator:

  enabled: true

#############################################
# Grafana Integration
#############################################

grafana:

  enabled: false

#############################################
# Default Rules
#############################################

defaultRules:

  create: true
    
