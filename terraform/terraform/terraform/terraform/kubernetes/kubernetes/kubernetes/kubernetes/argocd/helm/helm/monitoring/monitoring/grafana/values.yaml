#############################################
# Grafana Helm Values
#############################################

adminUser: admin

adminPassword: admin123

service:

  type: ClusterIP

  port: 3000

persistence:

  enabled: true

  storageClassName: gp3

  accessModes:

    - ReadWriteOnce

  size: 10Gi

resources:

  requests:

    cpu: 250m

    memory: 256Mi

  limits:

    cpu: 500m

    memory: 512Mi
#############################################
# Grafana Datasources
#############################################

datasources:

  datasources.yaml:

    apiVersion: 1

    datasources:

      - name: Prometheus

        type: prometheus

        access: proxy

        url: http://prometheus-server.monitoring.svc.cluster.local

        isDefault: true

#############################################
# Dashboard Providers
#############################################

dashboardProviders:

  dashboardproviders.yaml:

    apiVersion: 1

    providers:

      - name: default

        orgId: 1

        folder: ""

        type: file

        disableDeletion: false

        editable: true

        options:

          path: /var/lib/grafana/dashboards/default

#############################################
# Dashboard Sidecar
#############################################

sidecar:

  dashboards:

    enabled: true

  datasources:

    enabled: true
    #############################################
# Grafana Datasources
