#############################################
# Loki Helm Values
#############################################

loki:

  auth_enabled: false

  commonConfig:

    replication_factor: 1

  storage:

    type: filesystem

  persistence:

    enabled: true

    storageClassName: gp3

    size: 20Gi

service:

  type: ClusterIP

  port: 3100
  #############################################
# Resources
#############################################

resources:

  requests:

    cpu: 250m

    memory: 512Mi

  limits:

    cpu: 500m

    memory: 1Gi

#############################################
# Monitoring
#############################################

serviceMonitor:

  enabled: true

#############################################
# Security Context
#############################################

securityContext:

  runAsNonRoot: true

  runAsUser: 10001

#############################################
# Readiness & Liveness
#############################################

readinessProbe:

  enabled: true

livenessProbe:

  enabled: true
  #############################################
# Limits Configuration
#############################################

limits_config:

  retention_period: 168h

#############################################
# Schema Configuration
#############################################

schemaConfig:

  configs:

    - from: "2024-01-01"

      store: tsdb

      object_store: filesystem

      schema: v13

      index:

        prefix: loki_index_

        period: 24h

#############################################
# Compactor
#############################################

compactor:

  enabled: true

#############################################
# Complete
#############################################
