#############################################
# Promtail Helm Values
#############################################

config:

  clients:

    - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push

  positions:

    filename: /run/promtail/positions.yaml

  server:

    http_listen_port: 3101

    grpc_listen_port: 0

service:

  type: ClusterIP

  port: 3101
  #############################################
# Scrape Configurations
#############################################

  scrape_configs:

    - job_name: kubernetes-pods

      kubernetes_sd_configs:

        - role: pod

      pipeline_stages:

        - cri: {}

      relabel_configs:

        - source_labels:

            - __meta_kubernetes_namespace

          target_label: namespace

        - source_labels:

            - __meta_kubernetes_pod_name

          target_label: pod

        - source_labels:

            - __meta_kubernetes_pod_container_name

          target_label: container

#############################################
# Monitoring
#############################################

serviceMonitor:

  enabled: true
  #############################################
# Resources
#############################################

resources:

  requests:

    cpu: 100m

    memory: 128Mi

  limits:

    cpu: 250m

    memory: 256Mi

#############################################
# Node Scheduling
#############################################

tolerations: []

nodeSelector: {}

#############################################
# Security Context
#############################################

securityContext:

  runAsNonRoot: true

  runAsUser: 10001

#############################################
# Promtail Configuration Complete
#############################################
